services:
  qlik-sense-mcp-remote:
    image: ${DOCKER_IMAGE_REF:-qlik-sense-mcp-server:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "${INSTALL_PLAYWRIGHT:-false}"
    entrypoint: ["qlik-sense-mcp-gateway"]

    env_file:
      - .env

    environment:
      MCP_GATEWAY_HOST: "${MCP_GATEWAY_HOST:-0.0.0.0}"
      MCP_GATEWAY_PORT: "${MCP_GATEWAY_PORT:-8080}"
      MCP_GATEWAY_PATH: "${MCP_GATEWAY_PATH:-/mcp}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

    volumes:
      - type: bind
        source: ${QLIK_CERTS_DIR:-./certs}
        target: /certs
        read_only: true

    ports:
      - "${MCP_PUBLIC_PORT:-8080}:${MCP_GATEWAY_PORT:-8080}"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port=os.getenv('MCP_GATEWAY_PORT', '8080'); urllib.request.urlopen(f'http://127.0.0.1:{port}/healthz', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    restart: unless-stopped
